music_directory "~/torrents/what-i-listen-to/"
playlist_directory "~/.config/mpd/playlists"
db_file "~/.config/mpd/database"
log_file "~/.config/mpd/log"
bind_to_address "127.0.0.1"
filesystem_charset "UTF-8"
port "40220"
audio_output {
    type "pipewire"  # or "alsa" depending on your setup
    name "My Audio"
}

audio_output {
    host "localhost"
    type "shout"
    name "256K OGG"
    format "44100:16:2"
    port "8023"
    mount "/j*.ogg"
    encoder "ogg"
    bitrate "256"
    password "mpdsourcebrr"
    genre "j*"
}
